# Note that some of the fields in this template haven't been filled in yet.
# Please resolve any `null` fields before launching!

data_local: #this is only for model pretraining input data - composer accepts shards format - pass the folder path
data_remote: # If blank, files must be present in data_local

max_seq_len: 170 
tokenizer_name: #zhihan1996/DNABERT-2-117M 
mlm_probability: 0.30

# Run Name
run_name: #<db2_your_run_name>

# Model
model:
  name: mosaic_bert
  pretrained_model_name: 
  tokenizer_name: #zhihan1996/DNABERT-2-117M
  # Note: if using the pretrained_checkpoint argument to create a model from an existing checkpoint, 
  # make sure the model_config settings match the architecture of the existing model
  model_config:
    vocab_size: 4096
    hidden_size: 768 
    num_attention_heads: 12 
    num_hidden_layers: 12 
    intermediate_size: 3072 
    hidden_dropout_prob: 0.1 
    max_position_embeddings: 256 
    #This must be 0 for Flash Attention (triton or FA2 and FA4) to work
    attention_probs_dropout_prob: 0.0 
    alibi_starting_size: 256 

#Dataloaders

load_path: #mention the .pt file if starting from a previous final checkpoint in pretraining
#load_weights_only: true
root_dir: #optional
train_loader: 
  name: text
  dataset:
    streams:
      data:
        local: #path_to_your_shards_folder
        #proportion: <optional>
    tokenizer_name: ${tokenizer_name}
    split: #blank means None
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
  drop_last: true
  num_workers: 12 # change this based on your hardware settings

eval_loader:
  name: text
  dataset: #path_to_val 
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    split: #blank means None
    shuffle: false
    mlm_probability: 0.15 #We evaluate at 15% masking here
  drop_last: false
  num_workers: 12 # change this based on your hardware settings

# Optimization
scheduler:
  name: linear_decay_with_warmup
  t_warmup: 0.08dur # Warmup to the full LR for 8% of the training duration
  alpha_f: 0.02 # Linearly decay to 0.02x the full LR by the end of the training duration

optimizer:
  name: decoupled_adamw
  lr: 7.07e-4 
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-4 

algorithms:
  #fused_layernorm: {}
  gradient_clipping:
    clipping_type: norm 
    clipping_threshold: 2.0 # add your clipping threshold
  alibi:
    max_sequence_length: 256
  #gated_linear_units: {}
  low_precision_layernorm: {} # do not use low_precision_layernorm while using fp8 precision

max_duration: 250000ba #change this based on your hardware settings
global_train_batch_size: 8192 #change this based on your hardware settings

# System
seed: 42
device_eval_batch_size: 1024 
device_train_microbatch_size: auto # Composer auto-tunes and takes care of gradient accumulation steps
precision: amp_bf16

# Logging
progress_bar: true
log_to_console: true
console_log_interval: ?? #100ba 
eval_interval: ?? #2000ba
save_folder: ?? #path_to_save_folder
save_interval: ?? #5000ba - change these values based on your evaluation timepoints
save_overwrite: true
save_num_checkpoints_to_keep: 5

callbacks:
  speed_monitor:
    window_size: 100 
    #gpu_flops_available: 2246e12  #can be used for NVIDIA B200 
  runtime_estimator: {}
  lr_monitor: {}
  memory_monitor: {}
  optimizer_monitor:
    log_optimizer_metrics: true
  best_loss_checkpoint:
    save_folder: ?? #./best
    filename: #best-loss-checkpoint.pt

# FileLogger: Logs training and evaluation metrics to a text file
loggers:
  file_logger:
    filename: #./db2_pretraining.log
    buffer_size: 1
    flush_interval: 5000
  wandb:
    project: #your_wandb_project_name
    entity: #your_wandb_entity_name

# (Optional) Checkpoint to local filesystem or remote object store
# save_interval: 3500ba
# save_num_checkpoints_to_keep: 1  # Important, this cleans up checkpoints saved to DISK
# save_folder:      # e.g. './{run_name}/ckpt' (local) or 's3://mybucket/mydir/{run_name}/ckpt' (remote)

# (Optional) Load from local filesystem or remote object store to
# start from an existing model checkpoint;
# e.g. './ckpt/latest-rank{rank}.pt' (local), or
# 's3://mybucket/mydir/ckpt/latest-rank{rank}.pt' (remote)
